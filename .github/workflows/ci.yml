name: StreetLeague Backend CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-test-sonar:

    runs-on: self-hosted

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Java version
        run: java -version

      - name: Check Maven version
        run: mvn -version

      - name: Build and run tests
        run: mvn clean verify

      - name: Check Sonar Token Exists
        shell: powershell
        run: |
          if ("${{ secrets.SONAR_TOKEN }}" -eq "") {
            Write-Error "SONAR_TOKEN is missing"
          } else {
            Write-Host "SONAR_TOKEN exists"
          }

      - name: SonarQube Analysis
        shell: powershell
        run: |
          mvn sonar:sonar `
            "-Dsonar.projectKey=My-Spring-Project" `
            "-Dsonar.host.url=http://localhost:9000" `
            "-Dsonar.token=${{ secrets.SONAR_TOKEN }}"