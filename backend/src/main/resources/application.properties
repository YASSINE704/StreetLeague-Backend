# ============================================================
# MySQL Configuration (XAMPP)
# Make sure XAMPP MySQL service is running on port 3306
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/streetleague?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ============================================================
# Hibernate Configuration
# Auto-creates/updates database schema from entities
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ============================================================
# Server Configuration
# ============================================================
# Port 8080 is commonly occupied by other local services on this machine.
# Using 18080 keeps the backend reachable without conflicting with them.
server.port=18080
server.servlet.context-path=/api
spring.application.name=StreetLeague Backend

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=INFO
logging.level.com.streetLeague.backend=DEBUG
