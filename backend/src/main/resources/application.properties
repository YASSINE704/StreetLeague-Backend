spring.application.name=streetLeague-Backend

# MySQL Configuration (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/streetleague?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=8080

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging
logging.level.root=INFO
logging.level.com.streetLeague.backend=DEBUG

# Step 4 : Weather API (OpenWeatherMap)
# Pour activer : mettre enabled=true et ajouter votre clé API
# Clé gratuite sur https://openweathermap.org/api
weather.api.key=
weather.api.enabled=false

# Step 5 : Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=nafissa.briidah@gmail.com
spring.mail.password=gcecglkzqufmfqnh
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Coaching notification settings
coaching.notification.enabled=true
coaching.notification.hours-before=2

# Step 9 : AI Service (Python Flask)
ai.service.url=http://localhost:5000
ai.service.enabled=true
