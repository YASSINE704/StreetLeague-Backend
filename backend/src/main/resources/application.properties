# ============================================================
# MySQL Configuration (XAMPP)
# Make sure XAMPP MySQL service is running on port 3306
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/streetleague?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ============================================================
# Hibernate Configuration
# Flyway handles schema migrations; Hibernate validates only
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ============================================================
# Flyway Configuration
# Initialize on existing non-empty schema
# ============================================================
spring.flyway.baseline-on-migrate=true

# ============================================================
# Server Configuration
# ============================================================
# Port 8080 is commonly occupied by other local services on this machine.
# Using 18080 keeps the backend reachable without conflicting with them.
server.port=18080
spring.application.name=StreetLeague Backend

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=INFO
logging.level.com.streetLeague.backend=DEBUG

# ============================================================
# Auth / JWT Configuration
# Replace the secret in production with a long random value.
# ============================================================
app.jwt.secret=streetleague-local-development-secret-change-before-prod
app.jwt.expiration-seconds=86400

# ============================================================
# Coaching Module Configuration
# ============================================================
coaching.notification.enabled=true
coaching.notification.hours-before=2

# ============================================================
# Weather API Configuration (OpenWeatherMap)
# Get a free API key at: https://openweathermap.org/api
# Set weather.api.enabled=true and provide your key to activate.
# ============================================================
weather.api.enabled=true
weather.api.key=abab71a354c4adc9599d1d1facce5bd4

# ============================================================
# Email / SMTP Configuration
# Set these environment variables before running the backend:
# SMTP_USERNAME=your Outlook/Gmail address
# SMTP_PASSWORD=your app password or SMTP password
# For Outlook / Office365, keep smtp.office365.com:587.
# If app.email.enabled=false, codes are written to backend logs.
# ============================================================
app.email.enabled=${APP_EMAIL_ENABLED:false}
spring.mail.host=${SMTP_HOST:smtp.office365.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
