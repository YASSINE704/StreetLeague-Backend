<div *ngIf="isAuthRoute; else layout">
  <router-outlet></router-outlet>
</div>

<ng-template #layout>
  <div class="app-layout">
    <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
      <div class="sidebar-header">
        <div class="logo" *ngIf="!sidebarCollapsed">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">StreetLeague</span>
        </div>
        <span class="logo-icon" *ngIf="sidebarCollapsed">⚡</span>
      </div>

      <nav class="sidebar-nav">
        <ng-container *ngFor="let link of navLinks">
          <div class="nav-section" *ngIf="!sidebarCollapsed && link.section">
            <span class="nav-section-title">{{ link.section }}</span>
          </div>
          <a [routerLink]="link.path" routerLinkActive="active" class="nav-item">
            <span class="nav-icon">{{ link.icon }}</span>
            <span class="nav-label" *ngIf="!sidebarCollapsed">{{ link.label }}</span>
          </a>
        </ng-container>

        <div class="sidebar-footer" *ngIf="!sidebarCollapsed">
          <div class="user-info">
            <div class="user-avatar">{{ username.charAt(0).toUpperCase() || 'U' }}</div>
            <div class="user-details">
              <span class="user-name">{{ username || 'Utilisateur' }}</span>
              <span class="user-role">{{ getRoleLabel() }}</span>
            </div>
          </div>
          <button class="logout-btn" (click)="authService.logout()" title="Déconnexion">
            <span class="nav-icon">🚪</span>
          </button>
        </div>
      </nav>

      <button class="sidebar-toggle" (click)="sidebarCollapsed = !sidebarCollapsed">
        {{ sidebarCollapsed ? '→' : '←' }}
      </button>
    </aside>

    <div class="main-wrapper">
      <header class="top-header">
        <div class="header-left">
          <span class="header-subtitle">STREETLEAGUE PLATFORM</span>
          <h1 class="header-title">{{ getHeaderTitle() }}</h1>
        </div>
        <div class="header-right">
          <div class="header-badge" *ngIf="userRole">
            {{ getRoleLabel() }}
          </div>
        </div>
      </header>
      <main class="main-content">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</ng-template>
