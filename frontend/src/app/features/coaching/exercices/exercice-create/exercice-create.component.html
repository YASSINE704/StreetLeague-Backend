<div class="page">
  <div class="card">
    <div class="card-header"><h2>Créer un Exercice</h2></div>
    <div class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</div>
    <form #f="ngForm" (ngSubmit)="f.valid && onSubmit()">
      <div class="form-group">
        <label for="nom">Nom <span class="required">*</span></label>
        <input id="nom" [(ngModel)]="exercice.nom" name="nom" required minlength="2" maxlength="100" #nom="ngModel" placeholder="Nom de l'exercice">
        <div class="field-error" *ngIf="nom.invalid && nom.touched">
          <span *ngIf="nom.errors?.['required']">Le nom est obligatoire</span>
          <span *ngIf="nom.errors?.['minlength']">Minimum 2 caractères</span>
        </div>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" [(ngModel)]="exercice.description" name="description" rows="3" maxlength="500" placeholder="Description de l'exercice"></textarea>
        <div class="char-count">{{ exercice.description?.length || 0 }}/500</div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="type">Type</label>
          <select id="type" [(ngModel)]="exercice.type" name="type">
            <option *ngFor="let t of types" [value]="t">{{ t }}</option>
          </select>
        </div>
        <div class="form-group">
          <label for="videoUrl">URL Vidéo</label>
          <input id="videoUrl" [(ngModel)]="exercice.videoUrl" name="videoUrl" maxlength="500" placeholder="https://...">
        </div>
      </div>
      <div class="form-actions">
        <button type="button" (click)="onCancel()" class="btn btn-secondary">Annuler</button>
        <button type="submit" class="btn btn-primary" [disabled]="f.invalid">Créer l'exercice</button>
      </div>
    </form>
  </div>
</div>
