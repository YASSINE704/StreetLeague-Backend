<div class="sl-page sl-page--narrow">
  <div class="sl-card">
    <div class="sl-card-header"><h2>Créer une Séance</h2></div>
    <div class="sl-error-banner" *ngIf="errorMessage">{{ errorMessage }}</div>
    <form #f="ngForm" (ngSubmit)="f.valid && onSubmit()">
      <div class="sl-form-group">
        <label for="titreSeance">Titre <span class="sl-required">*</span></label>
        <input id="titreSeance" class="sl-input" [(ngModel)]="seance.titreSeance" name="titreSeance"
               required minlength="3" maxlength="100" #titreSeance="ngModel" placeholder="Nom de la séance">
        <div class="sl-field-error" *ngIf="titreSeance.invalid && titreSeance.touched">
          <span *ngIf="titreSeance.errors?.['required']">Le titre est obligatoire</span>
          <span *ngIf="titreSeance.errors?.['minlength']">Minimum 3 caractères</span>
        </div>
      </div>
      <div class="sl-form-row">
        <div class="sl-form-group">
          <label for="dateSeance">Date <span class="sl-required">*</span></label>
          <input id="dateSeance" class="sl-input" type="date" [(ngModel)]="seance.dateSeance" name="dateSeance" required #dateSeance="ngModel">
          <div class="sl-field-error" *ngIf="dateSeance.invalid && dateSeance.touched">Obligatoire</div>
        </div>
        <div class="sl-form-group">
          <label for="dureeMinutes">Durée (min)</label>
          <input id="dureeMinutes" class="sl-input" type="number" [(ngModel)]="seance.dureeMinutes" name="dureeMinutes" min="1" max="300" #duree="ngModel">
          <div class="sl-field-error" *ngIf="duree.invalid && duree.touched">Entre 1 et 300</div>
        </div>
      </div>
      <div class="sl-form-row">
        <div class="sl-form-group">
          <label for="intensite">Intensité</label>
          <select id="intensite" class="sl-select" [(ngModel)]="seance.intensite" name="intensite">
            <option *ngFor="let i of intensites" [value]="i">{{ i }}</option>
          </select>
        </div>
        <div class="sl-form-group">
          <label for="statut">Statut</label>
          <select id="statut" class="sl-select" [(ngModel)]="seance.statut" name="statut">
            <option *ngFor="let s of statuts" [value]="s">{{ s }}</option>
          </select>
        </div>
      </div>
      <div class="sl-form-group">
        <label for="programmeId">Programme <span class="sl-required">*</span></label>
        <select id="programmeId" class="sl-select" [(ngModel)]="seance.programmeId" name="programmeId" required #prog="ngModel">
          <option [value]="0" disabled>-- Sélectionner un programme --</option>
          <option *ngFor="let p of programmes" [value]="p.idProgramme">{{ p.titre }}</option>
        </select>
        <div class="sl-field-error" *ngIf="prog.touched && seance.programmeId === 0">Obligatoire</div>
      </div>
      <div class="sl-form-actions">
        <button type="button" (click)="onCancel()" class="sl-btn sl-btn--secondary">Annuler</button>
        <button type="submit" class="sl-btn sl-btn--primary" [disabled]="f.invalid || seance.programmeId === 0">Créer la séance</button>
      </div>
    </form>
  </div>
</div>
