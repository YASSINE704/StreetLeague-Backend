<div class="page" *ngIf="seance">
  <div class="card">
    <div class="card-header"><h2>Modifier la Séance</h2></div>
    <div class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</div>
    <form #f="ngForm" (ngSubmit)="f.valid && onSubmit()">
      <div class="form-group">
        <label for="titreSeance">Titre <span class="required">*</span></label>
        <input id="titreSeance" [(ngModel)]="seance.titreSeance" name="titreSeance"
               required minlength="3" maxlength="100" #titreSeance="ngModel">
        <div class="field-error" *ngIf="titreSeance.invalid && titreSeance.touched">
          <span *ngIf="titreSeance.errors?.['required']">Le titre est obligatoire</span>
          <span *ngIf="titreSeance.errors?.['minlength']">Minimum 3 caractères</span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="dateSeance">Date <span class="required">*</span></label>
          <input id="dateSeance" type="date" [(ngModel)]="seance.dateSeance" name="dateSeance" required #dateSeance="ngModel">
          <div class="field-error" *ngIf="dateSeance.invalid && dateSeance.touched">Obligatoire</div>
        </div>
        <div class="form-group">
          <label for="dureeMinutes">Durée (min)</label>
          <input id="dureeMinutes" type="number" [(ngModel)]="seance.dureeMinutes" name="dureeMinutes" min="1" max="300" #duree="ngModel">
          <div class="field-error" *ngIf="duree.invalid && duree.touched">Entre 1 et 300</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="intensite">Intensité</label>
          <select id="intensite" [(ngModel)]="seance.intensite" name="intensite">
            <option *ngFor="let i of intensites" [value]="i">{{ i }}</option>
          </select>
        </div>
        <div class="form-group">
          <label for="statut">Statut</label>
          <select id="statut" [(ngModel)]="seance.statut" name="statut">
            <option *ngFor="let s of statuts" [value]="s">{{ s }}</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" (click)="onCancel()" class="btn btn-secondary">Annuler</button>
        <button type="submit" class="btn btn-primary" [disabled]="f.invalid">Enregistrer</button>
      </div>
    </form>
  </div>
</div>
