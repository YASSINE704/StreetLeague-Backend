<div class="sl-page--narrow">
  <div class="sl-card">
    <div class="sl-card-header"><h2>Ajouter un Endroit</h2></div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="sl-form-row">
        <div class="sl-form-group">
          <label>Nom <span class="sl-required">*</span></label>
          <input class="sl-input" formControlName="nom" placeholder="Nom de l'endroit">
        </div>
        <div class="sl-form-group">
          <label>Type <span class="sl-required">*</span></label>
          <select class="sl-select" formControlName="type">
            <option *ngFor="let t of types" [value]="t">{{ t }}</option>
          </select>
        </div>
      </div>
      <div class="sl-form-row">
        <div class="sl-form-group">
          <label>Adresse <span class="sl-required">*</span></label>
          <input class="sl-input" formControlName="adresse" placeholder="Adresse">
        </div>
        <div class="sl-form-group">
          <label>Ville <span class="sl-required">*</span></label>
          <input class="sl-input" formControlName="ville" placeholder="Ville">
        </div>
      </div>
      <div class="sl-form-row">
        <div class="sl-form-group">
          <label>Capacité <span class="sl-required">*</span></label>
          <input class="sl-input" type="number" formControlName="capacite">
          <span class="sl-field-error" *ngIf="form.get('capacite')?.value < 0">La capacité ne peut pas être négative</span>
        </div>
        <div class="sl-form-group">
          <label>Statut <span class="sl-required">*</span></label>
          <select class="sl-select" formControlName="statut">
            <option *ngFor="let s of statuts" [value]="s">{{ s }}</option>
          </select>
        </div>
      </div>
      <div class="sl-form-group">
        <label>Localisation (cliquez sur la carte)</label>
        <div id="map" class="sl-map"></div>
        <small class="sl-char-count">📍 {{ form.get('latitude')?.value }}, {{ form.get('longitude')?.value }}</small>
      </div>
      <div class="sl-form-group">
        <label>Image</label>
        <input class="sl-input" type="file" accept="image/*" (change)="onFileSelected($event)">
      </div>
      <div class="sl-form-group">
        <label>Description</label>
        <textarea class="sl-textarea" formControlName="description" rows="3" placeholder="Description"></textarea>
      </div>
      <div class="sl-form-actions">
        <a routerLink="/endroits" class="sl-btn sl-btn--secondary">Annuler</a>
        <button type="submit" class="sl-btn sl-btn--primary" [disabled]="form.invalid">Créer</button>
      </div>
    </form>
  </div>
</div>
