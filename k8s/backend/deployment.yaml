apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pi-streetleague
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: streetleague/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18080
          envFrom:
            - configMapRef:
                name: streetleague-config
            - secretRef:
                name: streetleague-secrets
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: streetleague-secrets
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streetleague-secrets
                  key: SPRING_DATASOURCE_PASSWORD
          livenessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 18080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          hostPath:
            path: /data/streetleague/uploads
            type: DirectoryOrCreate
